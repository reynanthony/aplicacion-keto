<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetoCore - Migración de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght@20..48,100..700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d00; --secondary: #ffb300; --background: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #ff4d00 0%, #ff6b2c 100%); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(36, 34, 34, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,77,0,0.15); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    
    <header class="flex items-center justify-center gap-3 mb-8">
        <img src="logo.svg" alt="KetoCore Logo" class="w-12 h-12" style="filter:drop-shadow(0 0 10px rgba(255,77,0,0.5));">
        <h1 class="text-2xl font-black text-white">Migración de Datos</h1>
    </header>

    <main class="max-w-2xl mx-auto w-full space-y-6">
        
        <!-- Estado de conexión -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-orange-400">cloud</span>
                Conexión a Supabase
            </h2>
            <div id="connectionStatus" class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
                <span class="text-neutral-400">Verificando...</span>
            </div>
        </div>

        <!-- Datos encontrados -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-orange-400">database</span>
                Datos en localStorage
            </h2>
            <div id="localDataList" class="space-y-2">
                <div class="flex items-center justify-between py-2 border-b border-neutral-800">
                    <span class="text-neutral-400">Buscando datos...</span>
                    <span class="material-symbols-outlined text-neutral-500 animate-spin">progress_activity</span>
                </div>
            </div>
        </div>

        <!-- Progreso de migración -->
        <div class="glass-card rounded-2xl p-6 hidden" id="migrationProgress">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-orange-400">sync</span>
                Migrando datos...
            </h2>
            <div id="progressBar" class="w-full h-2 bg-neutral-800 rounded-full overflow-hidden mb-4">
                <div class="h-full gradient-bg transition-all duration-300" style="width: 0%"></div>
            </div>
            <div id="progressText" class="text-sm text-neutral-400">Esperando...</div>
            <div id="migrationLog" class="mt-4 space-y-1 text-xs font-mono text-neutral-500 max-h-40 overflow-y-auto"></div>
        </div>

        <!-- Acciones -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-orange-400">play_arrow</span>
                Acciones
            </h2>
            
            <div class="space-y-3">
                <button onclick="startMigration()" id="btnMigrate" disabled
                    class="w-full py-3 gradient-bg text-white font-bold rounded-xl hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">upload</span>
                    <span>Comenzar Migración</span>
                </button>
                
                <button onclick="loadSampleData()" id="btnSampleData"
                    class="w-full py-3 bg-neutral-800 text-white font-medium rounded-xl hover:bg-neutral-700 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">add</span>
                    <span>Cargar Datos de Ejemplo</span>
                </button>
                
                <button onclick="clearLocalStorage()"
                    class="w-full py-3 bg-red-500/20 border border-red-500/30 text-red-400 font-medium rounded-xl hover:bg-red-500/30 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">delete</span>
                    <span>Limpiar localStorage</span>
                </button>
            </div>
        </div>

        <!-- Resultado -->
        <div class="glass-card rounded-2xl p-6 hidden" id="migrationResult">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-green-400">check_circle</span>
                Resultado
            </h2>
            <div id="resultContent" class="text-neutral-300"></div>
            <button onclick="window.location.href='index.html'" 
                class="mt-4 w-full py-3 gradient-bg text-white font-bold rounded-xl hover:opacity-90 transition-all">
                Ir a la App
            </button>
        </div>
    </main>

    <script>
        // Supabase Client
        const SUPABASE_URL = 'https://lmbqzsonujwvqmfhjjgf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtYnF6c29udWp3dnFtZmhqamdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMDAsImV4cCI6MjA4ODgzMDMwMH0.SBsTQCh844rtGx0wLNZaEGO8NDmAVZjUj1YiDkRSm1k';
        
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State
        let localData = {};
        let migrationStarted = false;

        // Verificar conexión
        async function checkConnection() {
            const statusEl = document.getElementById('connectionStatus');
            
            try {
                const { data, error } = await window.supabase.from('alimentos').select('id').limit(1);
                
                if (!error) {
                    statusEl.innerHTML = `
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        <span class="text-green-400">Conectado a Supabase</span>
                    `;
                    return true;
                } else {
                    throw error;
                }
            } catch (error) {
                statusEl.innerHTML = `
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span class="text-red-400">Error de conexión: ${error.message}</span>
                `;
                return false;
            }
        }

        // Escanear localStorage
        function scanLocalStorage() {
            const listEl = document.getElementById('localDataList');
            localData = {};
            
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('keto') || key.startsWith('KetoCore')) {
                    keys.push(key);
                }
            }
            
            if (keys.length === 0) {
                listEl.innerHTML = `
                    <div class="flex items-center justify-between py-2">
                        <span class="text-neutral-400">No hay datos locales</span>
                        <span class="text-xs text-neutral-500">0 items</span>
                    </div>
                `;
                return;
            }
            
            let html = '';
            let totalItems = 0;
            
            keys.forEach(key => {
                try {
                    const data = localStorage.getItem(key);
                    const parsed = JSON.parse(data);
                    const count = Array.isArray(parsed) ? parsed.length : 1;
                    totalItems += count;
                    
                    localData[key] = parsed;
                    
                    html += `
                        <div class="flex items-center justify-between py-2 border-b border-neutral-800">
                            <span class="text-white">${key}</span>
                            <span class="text-xs text-orange-400 bg-orange-500/10 px-2 py-1 rounded">${count} items</span>
                        </div>
                    `;
                } catch (e) {
                    html += `
                        <div class="flex items-center justify-between py-2 border-b border-neutral-800">
                            <span class="text-white">${key}</span>
                            <span class="text-xs text-red-400">Error</span>
                        </div>
                    `;
                }
            });
            
            html += `
                <div class="flex items-center justify-between py-2 mt-2">
                    <span class="text-neutral-400 font-medium">Total</span>
                    <span class="text-lg font-bold text-orange-400">${totalItems} items</span>
                </div>
            `;
            
            listEl.innerHTML = html;
            
            // Habilitar botón si hay datos
            document.getElementById('btnMigrate').disabled = totalItems === 0;
        }

        // Log de migración
        function log(message, type = 'info') {
            const logEl = document.getElementById('migrationLog');
            const colors = {
                info: 'text-blue-400',
                success: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400'
            };
            
            const time = new Date().toLocaleTimeString('es-ES');
            logEl.innerHTML += `<div class="${colors[type]}">[${time}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Actualizar progreso
        function updateProgress(current, total, message) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = message;
        }

        // Migración
        async function startMigration() {
            if (migrationStarted) return;
            migrationStarted = true;
            
            const progressEl = document.getElementById('migrationProgress');
            progressEl.classList.remove('hidden');
            
            const btn = document.getElementById('btnMigrate');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>Migrando...</span>';
            
            log('Iniciando migración...', 'info');
            
            let migrated = 0;
            let total = Object.keys(localData).length;
            
            // Migrar cada key
            for (const [key, data] of Object.entries(localData)) {
                try {
                    // Mapear key de localStorage a tabla de Supabase
                    const table = mapKeyToTable(key);
                    
                    if (!table) {
                        log(`Key "${key}" no tiene tabla destino, omitiendo`, 'warning');
                        total--;
                        continue;
                    }
                    
                    log(`Migrando ${key} → ${table}`, 'info');
                    
                    if (Array.isArray(data)) {
                        for (const item of data) {
                            await migrateItem(table, item, key);
                            migrated++;
                            updateProgress(migrated, total, `Migrando: ${key}`);
                        }
                    } else {
                        await migrateItem(table, data, key);
                        migrated++;
                        updateProgress(migrated, total, `Migrando: ${key}`);
                    }
                    
                    log(`${key} migrado correctamente`, 'success');
                } catch (error) {
                    log(`Error migrando ${key}: ${error.message}`, 'error');
                }
            }
            
            updateProgress(100, 100, 'Migración completada');
            log('✅ Migración finalizada', 'success');
            
            // Mostrar resultado
            document.getElementById('migrationResult').classList.remove('hidden');
            document.getElementById('resultContent').innerHTML = `
                <p class="text-green-400 font-medium">¡Migración exitosa!</p>
                <p class="text-neutral-400 mt-2">Se migraron ${migrated} registros a Supabase.</p>
            `;
            
            // Limpiar localStorage después de migrar
            // Descomenta la siguiente línea si estás seguro:
            // clearLocalStorageSilent();
        }

        // Mapear key de localStorage a tabla de Supabase
        function mapKeyToTable(key) {
            const mappings = {
                'ketoFoods': 'alimentos',
                'KetoCore_foods': 'alimentos',
                'ketoRecipes': 'recetas',
                'KetoCore_recipes': 'recetas',
                'keto_profile': 'usuarios',
                'KetoCore_profile': 'usuarios',
                'keto_weight_history': 'datos_usuario',
                'KetoCore_weight_history': 'datos_usuario',
                'ketoStreak': 'progreso_racha',
                'KetoCore_streak': 'progreso_racha'
            };
            
            return mappings[key] || null;
        }

        // Migrar un item individual
        async function migrateItem(table, item, originalKey) {
            // Normalizar campos del item
            const normalized = normalizeItem(item, originalKey);
            
            if (Object.keys(normalized).length === 0) return;
            
            const { data, error } = await window.supabase
                .from(table)
                .upsert(normalized)
                .select()
                .single();
            
            if (error) {
                throw new Error(error.message);
            }
            
            return data;
        }

        // Normalizar campos de datos legacy
        function normalizeItem(item, key) {
            const normalized = { ...item };
            
            // Eliminar timestamps legacy que pueden causar conflictos
            delete normalized._id;
            delete normalized.__v;
            
            // Mapeo de campos en español → inglés
            const fieldMappings = {
                'nombre': 'nombre',
                'name': 'nombre',
                'categoria': 'categoria',
                'category': 'categoria',
                'calorias': 'calorias',
                'calories': 'calorias',
                'proteinas': 'proteinas',
                'protein': 'proteinas',
                'carbos': 'carbos',
                'carbs': 'carbos',
                'grasas': 'grasas',
                'fat': 'grasas',
                'fibra': 'fibra',
                'fiber': 'fibra',
                'fecha': 'fecha',
                'date': 'fecha',
                'peso': 'peso',
                'weight': 'peso'
            };
            
            // Renombrar campos
            Object.keys(fieldMappings).forEach(oldKey => {
                if (normalized[oldKey] !== undefined && fieldMappings[oldKey] !== oldKey) {
                    normalized[fieldMappings[oldKey]] = normalized[oldKey];
                    delete normalized[oldKey];
                }
            });
            
            return normalized;
        }

        // Limpiar localStorage
        function clearLocalStorage() {
            if (!confirm('¿Estás seguro de limpiar todos los datos locales?')) return;
            
            clearLocalStorageSilent();
            
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('keto') || key.startsWith('KetoCore')) {
                    keys.push(key);
                }
            }
            
            keys.forEach(key => localStorage.removeItem(key));
            
            scanLocalStorage();
            alert('localStorage limpiado');
        }

        function clearLocalStorageSilent() {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('keto') || key.startsWith('KetoCore')) {
                    keys.push(key);
                }
            }
            keys.forEach(key => localStorage.removeItem(key));
        }

        // Inicializar
        async function init() {
            await checkConnection();
            scanLocalStorage();
        }

        init();
    </script>
</body>
</html>
