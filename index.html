<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- PWA Manifest y meta tags para instalación -->
<link rel="manifest" href="/aplicacion-keto/manifest.json">
<link rel="icon" type="image/svg+xml" href="/aplicacion-keto/favicon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KetoLab">
<link rel="apple-touch-icon" href="/aplicacion-keto/icons/icon-192x192.png">
<meta name="theme-color" content="#ff4d00">
<meta name="mobile-web-app-capable" content="yes">
<title>KetoLab | Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#ffccbc",
        "primary-container": "#ff4d00",
        "on-primary": "#ffffff",
        "on-primary-container": "#ffffff",
        "surface": "#0a0a0a",
        "surface-container": "#181717",
        "surface-container-low": "#111010",
        "surface-container-high": "#1e1c1c",
        "surface-container-highest": "#242222",
        "on-surface": "#ffffff",
        "on-surface-variant": "#adaaaa",
        "outline": "#767575",
        "outline-variant": "#484847",
        "secondary": "#ffb300",
        "secondary-container": "#b45309",
        "tertiary": "#ffc107",
        "error": "#ff7351",
        "background": "#0a0a0a"
      },
      fontFamily: {
        "headline": ["Plus Jakarta Sans", "sans-serif"],
        "body": ["Inter", "sans-serif"],
        "label": ["Inter", "sans-serif"]
      },
      borderRadius: {"DEFAULT": "1rem", "lg": "2rem"}
    }
  }
})();

function showUpdateWeightModal() {
  var ketoProfile = safeParseJSON(localStorage.getItem('keto_profile'), {});
  var currentWeight = ketoProfile.weight || 80;
  
  var modal = document.createElement('div');
  modal.className = 'fixed inset-0 z-[90] flex items-center justify-center p-4 pointer-events-none';
  modal.innerHTML = '<div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="this.closest(\'.fixed\').remove()"></div>' +
    '<div class="glass-card rounded-2xl p-5 w-full max-w-sm pointer-events-auto">' +
      '<div class="flex items-center gap-3 mb-4">' +
        '<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center"><span class="material-symbols-outlined text-primary-container">scale</span></div>' +
        '<div><h3 class="text-lg font-headline font-bold text-white">Actualizar Peso</h3><p class="text-xs text-white/60">Registra tu peso actual</p></div>' +
        '<button onclick="this.closest(\'.fixed\').remove()" class="w-8 h-8 rounded-full flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all ml-auto"><span class="material-symbols-outlined text-lg">close</span></button>' +
      '</div>' +
      '<div class="mb-4">' +
        '<label class="text-xs text-white/60 uppercase tracking-wider block mb-2">Peso actual (kg)</label>' +
        '<input type="number" id="newWeight" value="' + currentWeight + '" step="0.1" min="30" max="200" class="w-full bg-surface-container text-white border border-outline rounded-xl px-4 py-3 text-center text-xl font-bold">' +
      '</div>' +
      '<div class="flex gap-3">' +
        '<button onclick="this.closest(\'.fixed\').remove()" class="flex-1 py-3 rounded-xl bg-surface-container text-white font-medium hover:bg-surface-container-highest transition-colors">Cancelar</button>' +
        '<button onclick="saveNewWeight()" class="flex-1 py-3 rounded-xl bg-primary-container text-white font-bold hover:bg-primary-container/80 transition-colors">Guardar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

function saveNewWeight() {
  var newWeight = parseFloat(document.getElementById('newWeight').value);
  if (!newWeight || newWeight < 30 || newWeight > 200) {
    alert('Por favor ingresa un peso válido');
    return;
  }
  
  var ketoProfile = safeParseJSON(localStorage.getItem('keto_profile'), {});
  var oldWeight = ketoProfile.weight || 80;
  ketoProfile.weight = newWeight;
  
  // Save to weight history
  var today = new Date().toISOString().slice(0, 10);
  var weightHistory = safeParseJSON(localStorage.getItem('weight_history'), []);
  weightHistory.push({ date: today, weight: newWeight });
  // Keep only last 365 days
  if (weightHistory.length > 365) weightHistory = weightHistory.slice(-365);
  localStorage.setItem('weight_history', JSON.stringify(weightHistory));
  
  localStorage.setItem('keto_profile', JSON.stringify(ketoProfile));
  
  document.querySelector('.fixed').remove();
  loadDashboard();
  
  var diff = oldWeight - newWeight;
  var msg = diff > 0 ? 'Peso actualizado. Has perdido ' + diff.toFixed(1) + 'kg!' : (diff < 0 ? 'Peso actualizado. Has ganado ' + Math.abs(diff).toFixed(1) + 'kg' : 'Peso actualizado');
  if (typeof showToast === 'function') {
    showToast(msg);
  }
}
</script>
<script src="/aplicacion-keto/backup.js"></script>
<script src="/aplicacion-keto/recipe-suggestions.js"></script>
</body>
</html>
