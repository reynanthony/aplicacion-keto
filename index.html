<script>
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  var icon = document.querySelector('header button[onclick="toggleTheme()"]');
  if (icon) {
    icon.textContent = document.documentElement.classList.contains('dark') ? 'dark_mode' : 'light_mode';
  }
}

function showNotifications() {
  var modal = document.getElementById('notificationsModal');
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeNotifications() {
  var modal = document.getElementById('notificationsModal');
  modal.classList.add('hidden');
  document.body.style.overflow = '';
}

function toggleSidebar() {
  var body = document.body;
  var sidebar = document.getElementById('sidebarNav');
  var toggleBtn = document.getElementById('sidebarToggle');
  var topbarPl = document.querySelector('.topbar-pl');
  var mainContent = document.querySelector('.main-content');
  
  body.classList.toggle('sidebar-collapsed');
  
  if (body.classList.contains('sidebar-collapsed')) {
    sidebar.style.width = '72px';
    topbarPl.style.paddingLeft = '88px';
    mainContent.style.marginLeft = '72px';
    toggleBtn.style.left = '72px';
    toggleBtn.innerHTML = '<span class="material-symbols-outlined text-white/60 hover:text-primary-container text-lg">chevron_right</span>';
    localStorage.setItem('sidebarCollapsed', 'true');
  } else {
    sidebar.style.width = '256px';
    topbarPl.style.paddingLeft = '272px';
    mainContent.style.marginLeft = '256px';
    toggleBtn.style.left = '256px';
    toggleBtn.innerHTML = '<span class="material-symbols-outlined text-white/60 hover:text-primary-container text-lg">chevron_left</span>';
    localStorage.setItem('sidebarCollapsed', 'false');
  }
}

function showUpdateWeightModal() {
  var modal = document.getElementById('weightModal');
  var input = document.getElementById('newWeightInput');
  var currentWeight = localStorage.getItem('currentWeight') || '70';
  if (input) input.value = currentWeight;
  if (modal) {
    modal.classList.remove('hidden');
  }
  document.body.style.overflow = 'hidden';
}

function closeWeightModal() {
  var modal = document.getElementById('weightModal');
  modal.classList.add('hidden');
  document.body.style.overflow = '';
}

function saveNewWeight() {
  var input = document.getElementById('newWeightInput');
  var newWeight = parseFloat(input.value);
  
  if (!newWeight || newWeight < 20 || newWeight > 300) {
    alert('Por favor ingresa un peso válido entre 20 y 300 kg');
    return;
  }
  
  var currentWeight = parseFloat(localStorage.getItem('currentWeight') || newWeight);
  localStorage.setItem('currentWeight', newWeight);
  
  var weightHistory = JSON.parse(localStorage.getItem('weight_history') || '[]');
  weightHistory.push({
    weight: newWeight,
    date: new Date().toISOString().split('T')[0]
  });
  localStorage.setItem('weight_history', JSON.stringify(weightHistory));
  
  closeWeightModal();
  updateDashboard();
}

function safeSetText(id, text) {
  var el = document.getElementById(id);
  if (el) el.textContent = text;
}

function safeSetHTML(id, html) {
  var el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function safeSetStyle(id, prop, value) {
  var el = document.getElementById(id);
  if (el) el.style[prop] = value;
}

function loadDashboard() {
  try {
    var userData = getLocalData('userData', schemas.userData, getDefaultUserData());
    var ketoProfile = safeParseJSON(localStorage.getItem('keto_profile'), {});
    
    var userName = ketoProfile.name || '';
    var greetingEl = document.getElementById('userGreeting');
    if (greetingEl) {
      if (userName) {
        greetingEl.textContent = 'Hola, ' + userName;
      } else {
        greetingEl.textContent = 'Bienvenido';
      }
    }
    
    var profileBtn = document.getElementById('profileBtn');
    if (profileBtn && userName) {
      profileBtn.textContent = userName.charAt(0).toUpperCase();
      profileBtn.title = 'Mi perfil: ' + userName;
    }
    
    var todayKey = new Date().toISOString().slice(0, 10);
    var rawData = localStorage.getItem('checklist_' + todayKey);
    var checklistData = safeParseJSON(rawData, {});
    
    var water = checklistData.water !== undefined ? checklistData.water : (userData.waterIntake || 0);
    var workout = checklistData.workout !== undefined ? checklistData.workout : (userData.workoutMinutes || 0);
    var walk = checklistData.walk !== undefined ? checklistData.walk : (userData.walkMinutes || 0);
    var protein = checklistData.protein !== undefined ? checklistData.protein : (userData.proteinConsumed || 0);
    var sleep = checklistData.sleep !== undefined ? checklistData.sleep : (userData.sleepHours || 0);
  
  var macros = getLocalData('keto_macros', schemas.ketoMacros, getDefaultMacros());
  var targetCal = parseInt(macros.calories) || 1800;
  var targetProt = parseInt(macros.protein) || 159;
  var targetFat = parseInt(macros.fat) || 150;
  var targetCarbs = parseInt(macros.carbs) || 25;
  
  var mealPlan = getLocalData('mealPlan_' + todayKey, schemas.mealPlan, getDefaultMealPlan());
  var consumedCal = 0, consumedProt = 0, consumedFat = 0, consumedCarbs = 0;
  
  var consumedMacrosRaw = localStorage.getItem('consumedMacros_' + todayKey);
  if (consumedMacrosRaw) {
    var consumedMacros = JSON.parse(consumedMacrosRaw);
    consumedCal = consumedMacros.cal || 0;
    consumedProt = consumedMacros.prot || 0;
    consumedFat = consumedMacros.fat || 0;
    consumedCarbs = consumedMacros.carbs || 0;
  } else {
    Object.keys(mealPlan).forEach(function(meal) {
      mealPlan[meal].forEach(function(item) {
        var foodPort = parseFloat(item.portion) || 100;
        var ratio = foodPort / 100;
        consumedCal += Math.round((parseFloat(item.calories) || 0) * ratio);
        consumedProt += Math.round((parseFloat(item.protein) || 0) * ratio);
        consumedFat += Math.round((parseFloat(item.fat) || 0) * ratio);
        consumedCarbs += Math.round((parseFloat(item.carbs) || 0) * ratio);
      });
    });
  }
  
  var startWeight = ketoProfile.weight || userData.startWeight || 159;
  var goalWeight = ketoProfile.goalWeight || userData.goalWeight || 140;
  var currentWeight = ketoProfile.weight || startWeight;
  
  var totalToLose = startWeight - goalWeight;
  var lostSoFar = startWeight - currentWeight;
  var weightProgress = totalToLose > 0 ? Math.round((lostSoFar / totalToLose) * 100) : 0;
  if (weightProgress < 0) weightProgress = 0;
  if (weightProgress > 100) weightProgress = 100;
  
  safeSetText('progressPercent', weightProgress + '%');
  
  var circle = document.getElementById('progressCircle');
  if (circle) {
    var circumference = 402;
    var offset = circumference - (circumference * weightProgress / 100);
    circle.style.strokeDashoffset = offset;
  }
  
  var remaining = currentWeight - goalWeight;
  var weightEl = document.getElementById('weightDisplay');
  if (weightEl) {
    weightEl.innerHTML = currentWeight + 'kg <span class="text-on-surface-variant font-light">→</span> ' + goalWeight + 'kg';
  }
  safeSetHTML('remainingKg', remaining > 0 ? remaining + 'kg restantes' : (remaining < 0 ? Math.abs(remaining) + 'kg bajo meta' : '¡Meta alcanzada!') + ' <span class="text-primary-container text-xs ml-1">(click to update)</span>');
  
  var weeklyLoss = '0';
  if (typeof calculateWeeklyLoss === 'function') {
    weeklyLoss = calculateWeeklyLoss();
  } else {
    weeklyLoss = localStorage.getItem('weeklyLoss') || '0';
  }
  safeSetHTML('weeklyProgress', '<span class="material-symbols-outlined text-primary-container text-sm">trending_down</span><span class="text-primary-container font-headline font-bold text-sm">' + weeklyLoss + 'KG ESTA SEMANA</span>');
  
  var hydrationPercent = Math.round((water / 3) * 100);
  if (hydrationPercent > 100) hydrationPercent = 100;
  safeSetText('hydrationDisplay', Math.round(water) + '/3L');
  
  var workoutPercent = Math.round((workout / 60) * 100);
  if (workoutPercent > 100) workoutPercent = 100;
  safeSetText('workoutDisplay', workout + '/60min');
  
  var walkPercent = Math.round((walk / 60) * 100);
  if (walkPercent > 100) walkPercent = 100;
  safeSetText('walkDisplay', walk + '/60min');
  
  var sleepPercentVal = Math.round((sleep / 8) * 100);
  if (sleepPercentVal > 100) sleepPercentVal = 100;
  safeSetText('sleepDisplay', sleep + '/8h');
  
  var proteinPercent = Math.round((consumedProt / targetProt) * 100);
  if (proteinPercent > 100) proteinPercent = 100;
  
  var fatPercent = Math.round((consumedFat / targetFat) * 100);
  if (fatPercent > 100) fatPercent = 100;
  
  var carbsPercent = Math.round((consumedCarbs / targetCarbs) * 100);
  if (carbsPercent > 100) carbsPercent = 100;
  
  var caloriesPercent = Math.round((consumedCal / targetCal) * 100);
  if (caloriesPercent > 100) caloriesPercent = 100;
  var caloriesRemaining = Math.max(0, targetCal - consumedCal);
  
  safeSetText('consumedCalDisplay', consumedCal);
  safeSetText('targetCalDisplay', targetCal);
  safeSetStyle('caloriesBar', 'width', caloriesPercent + '%');
  safeSetText('caloriesRemaining', caloriesRemaining);
  
  safeSetText('consumedProtDisplay', consumedProt);
  safeSetText('targetProtDisplay', targetProt);
  safeSetStyle('proteinBar', 'width', proteinPercent + '%');
  
  safeSetText('consumedFatDisplay', consumedFat);
  safeSetText('targetFatDisplay', targetFat);
  safeSetStyle('fatBar', 'width', fatPercent + '%');
  
  safeSetText('consumedCarbsDisplay', consumedCarbs);
  safeSetText('targetCarbsDisplay', targetCarbs);
  safeSetStyle('carbsBar', 'width', carbsPercent + '%');
  
  renderWeightHistory();
  loadMonthlyStats();
  } catch (e) {
    console.error('Error loading dashboard:', e);
  }
}

function loadMonthlyStats() {
  try {
    var now = new Date();
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    var monthKey = now.toISOString().slice(0, 7);
    
    var totalMeals = 0;
    var totalMonthCalories = 0;
    var monthMealsHtml = localStorage.getItem('monthMeals_' + monthKey);
    if (monthMealsHtml) {
      var monthMealsData = JSON.parse(monthMealsHtml);
      totalMeals = monthMealsData.count || 0;
      totalMonthCalories = monthMealsData.calories || 0;
    } else {
      for (var d = new Date(monthStart); d <= now; d.setDate(d.getDate() + 1)) {
        var dateKey = d.toISOString().slice(0, 10);
        var mealPlan = getLocalData('mealPlan_' + dateKey, null, null);
        if (mealPlan) {
          Object.keys(mealPlan).forEach(function(meal) {
            totalMeals += (mealPlan[meal] || []).length;
          });
        }
      }
      localStorage.setItem('monthMeals_' + monthKey, JSON.stringify({ count: totalMeals, calories: totalMonthCalories }));
    }
    
    var workouts = getLocalData('ketoWorkouts', [], []);
    var monthWorkouts = workouts.filter(function(w) {
      var d = new Date(w.date);
      return d >= monthStart;
    });
    var mWorkouts = monthWorkouts.length;
    var mMinutes = monthWorkouts.reduce(function(s, w) { return s + (w.duration || 0); }, 0);
    
    var workoutGoal = 20;
    var workoutProgress = Math.min(100, Math.round((mWorkouts / workoutGoal) * 100));
    
    safeSetText('monthMeals', totalMeals);
    safeSetText('monthCalories', totalMonthCalories || 0);
    safeSetText('monthWorkouts', mWorkouts);
    safeSetText('monthMinutes', mMinutes);
    safeSetText('monthProgressText', workoutProgress + '% (' + mWorkouts + '/' + workoutGoal + ')');
    safeSetStyle('monthProgressBar', 'width', workoutProgress + '%');
  } catch (e) {
    console.error('Error loading monthly stats:', e);
  }
}

function renderWeightHistory() {
  var container = document.getElementById('weightHistory');
  if (!container) return;
  
  // Obtener peso actual del perfil
  var ketoProfile = {};
  try { ketoProfile = JSON.parse(localStorage.getItem('keto_profile') || '{}'); } catch(e) { ketoProfile = {}; }
  var currentWeight = ketoProfile.weight || 80;
  
  // Obtener historial
  var stored = localStorage.getItem('keto_weight_history');
  var weightHistory = [];
  try { weightHistory = stored ? JSON.parse(stored) : []; } catch(e) { weightHistory = []; }
  
  // Si no hay historial pero hay peso actual, guardar
  if ((!weightHistory || weightHistory.length === 0) && currentWeight) {
    saveWeightToHistory(currentWeight);
    weightHistory = [{ date: new Date().toISOString().slice(0, 10), weight: currentWeight }];
  }
  
  if (!Array.isArray(weightHistory) || weightHistory.length === 0) {
    container.innerHTML = '<div class="w-full text-center py-3"><p class="text-xs text-on-surface-variant">Registra tu peso en</p><a href="macros.html" class="text-sm text-primary-container hover:underline font-bold">Macros →</a></div>';
    return;
  }
  
  var sorted = weightHistory.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
  var last7 = sorted.slice(-7);
  
  // Asegurar que el peso de hoy esté en el historial
  var today = new Date().toISOString().slice(0, 10);
  var hasToday = last7.some(function(e) { return e.date === today; });
  if (!hasToday) {
    last7.push({ date: today, weight: currentWeight });
  }
  
  if (last7.length === 0) {
    container.innerHTML = '<p class="text-xs text-on-surface-variant text-center w-full">Sin datos</p>';
    return;
  }
  
  var weights = last7.map(function(e) { return e.weight; });
  var minW = Math.min.apply(null, weights) - 0.5;
  var maxW = Math.max.apply(null, weights) + 0.5;
  var range = maxW - minW || 1;
  
  var html = '';
  last7.forEach(function(entry, index) {
    var height = ((entry.weight - minW) / range) * 100;
    if (height < 15) height = 15;
    if (height > 100) height = 100;
    var isToday = index === last7.length - 1;
    var date = new Date(entry.date);
    var dayNum = date.getDate();
    html += '<div class="flex flex-col items-center">';
    html += '<div class="w-full bg-surface-container-high rounded-lg relative" style="height: 50px;">';
    html += '<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-3/4 rounded-t transition-all ' + (isToday ? 'bg-primary-container' : 'bg-secondary/60') + '" style="height: ' + height + '%"></div>';
    html += '</div>';
    html += '<span class="text-[10px] mt-1 ' + (isToday ? 'text-primary-container font-bold' : 'text-on-surface-variant') + '">' + dayNum + '</span>';
    html += '<span class="text-[9px] font-bold text-white">' + entry.weight + 'kg</span>';
    html += '</div>';
  });
  
  container.innerHTML = html;
}

loadDashboard();
</script>

<script>
// ==================== REGISTRO DE SERVICE WORKER ====================
// Implementación PWA para KetoLab

(function() {
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/aplicacion-keto/sw.js')
        .then(registration => {
          console.log('[PWA] Service Worker registrado correctamente en:', registration.scope);
          
          // Verificar actualizaciones
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            console.log('[PWA] Nueva versión del Service Worker encontrada');
            
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] Nueva versión disponible, actualizar para obtenerla');
                // Mostrar notificación al usuario
                if (confirm('Nueva versión disponible. ¿Actualizar ahora?')) {
                  window.location.reload();
                }
              }
            });
          });
        })
        .catch(error => {
          console.error('[PWA] Error al registrar Service Worker:', error);
        });
    });
  }
  
  // Detectar si la app está instalada y mostrar prompt de instalación
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  
  window.addEventListener('beforeinstallprompt', (e) => {
    // Prevenir que Chrome muestre el prompt automático
    e.preventDefault();
    deferredPrompt = e;
    
    // Mostrar botón de instalación personalizado si existe
    if (installBtn) {
      installBtn.style.display = 'flex';
      console.log('[PWA] App instalable, botón de instalación disponible');
    }
  });
  
  // Manejar clic en botón de instalación
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        console.log('[PWA] No hay prompt de instalación disponible');
        return;
      }
      
      // Mostrar prompt de instalación
      deferredPrompt.prompt();
      
      // Esperar elección del usuario
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`[PWA] Usuario ${outcome === 'accepted' ? 'aceptó' : 'rechazó'} la instalación`);
      
      // Limpiar prompt
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });
  }
  
  // Detectar cuando la app se abre desde el homescreen
  if (window.matchMedia('(display-mode: standalone)').matches) {
    console.log('[PWA] App abierta desde el homescreen');
    document.body.classList.add('pwa-mode');
  }
  
  // Detectar cambios de conexión
  window.addEventListener('online', () => {
    console.log('[PWA] Conexión restaurada');
    // Opcional: mostrar toast de reconexión
    if (typeof showToast === 'function') {
      showToast('Conexión restaurada');
    }
  });
  
  window.addEventListener('offline', () => {
    console.log('[PWA] Sin conexión - modo offline');
    if (typeof showToast === 'function') {
      showToast('Modo offline - algunos datos pueden no sincronizarse');
    }
  });
})();
</script>
