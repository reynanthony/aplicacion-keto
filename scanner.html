<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link rel="manifest" href="/aplicacion-keto/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KetoLab">
<meta name="theme-color" content="#ff4d00">
<title>KetoLab | Escaner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#ffccbc","primary-container":"#ff4d00","on-primary":"#ffffff","surface":"#0a0a0a","surface-container":"#181717","surface-container-low":"#111010","surface-container-high":"#1e1c1c","surface-container-highest":"#242222","on-surface":"#ffffff","on-surface-variant":"#adaaaa","outline":"#767575","secondary":"#ffb300","background":"#0a0a0a"},fontFamily:{headline:["Plus Jakarta Sans","sans-serif"],body:["Inter","sans-serif"]}}}};
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.glass-card{background:rgba(36,34,34,0.4);backdrop-filter:blur(20px);border:1px solid rgba(255,77,0,0.1)}
#scanner-view{position:relative;width:100%;height:300px;background:#000;overflow:hidden}
#scanner-video{width:100%;height:100%;object-fit:cover}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-frame{width:70%;height:150px;border:3px solid #ff4d00;border-radius:12px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,0.5)}
.scanner-corners{position:absolute;width:30px;height:30px;border:4px solid #ff4d00}
.scanner-corners.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
.scanner-corners.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;border-radius:0 8px 0 0}
.scanner-corners.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;border-radius:0 0 0 8px}
.scanner-corners.br{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 8px 0}
.scan-line{position:absolute;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,#ff4d00,transparent);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%,100%{top:10%}50%{top:90%}}
#result-section{transition:all 0.3s ease}
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<header class="bg-surface-container-low p-4 flex items-center justify-between border-b border-primary-container/10">
<a href="alimentos.html" class="flex items-center gap-2 text-white hover:text-primary-container">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-medium">Volver</span>
</a>
<h1 class="text-lg font-headline font-bold">Escanear</h1>
<button onclick="toggleCamera()" id="toggleBtn" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-white/70" id="cameraIcon">flash_on</span>
</button>
</header>

<main class="flex-1 flex flex-col p-4 space-y-4">
<div id="scanner-view">
<video id="scanner-video" autoplay playsinline muted></video>
<div class="scanner-overlay">
<div class="scanner-frame">
<div class="scanner-corners tl"></div>
<div class="scanner-corners tr"></div>
<div class="scanner-corners bl"></div>
<div class="scanner-corners br"></div>
<div class="scan-line"></div>
</div>
</div>
<div id="scanner-status" class="absolute bottom-4 left-0 right-0 text-center">
<p class="text-white/70 text-sm bg-black/50 py-2">Toca el botón para iniciar la cámara</p>
</div>
</div>

<button onclick="initScanner()" class="w-full py-4 bg-primary-container text-white rounded-xl font-bold flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">camera_alt</span>
Iniciar Cámara
</button>

<div id="result-section" class="hidden">
<div class="glass-card rounded-2xl p-4">
<div class="flex items-center gap-3 mb-4">
<div class="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-green-400 text-2xl">check_circle</span>
</div>
<div>
<h3 class="text-white font-bold">Código detectado</h3>
<p id="barcode-value" class="text-on-surface-variant text-sm font-mono"></p>
</div>
</div>

<div class="space-y-3">
<input type="text" id="product-name" placeholder="Nombre del producto" class="w-full bg-surface-container-high text-white rounded-lg px-3 py-2 border border-outline">
<div class="grid grid-cols-2 gap-3">
<input type="number" id="product-calories" placeholder="Calorías" class="bg-surface-container-high text-white rounded-lg px-3 py-2 border border-outline">
<input type="number" id="product-protein" placeholder="Proteína (g)" class="bg-surface-container-high text-white rounded-lg px-3 py-2 border border-outline">
</div>
<div class="grid grid-cols-2 gap-3">
<input type="number" id="product-fat" placeholder="Grasa (g)" class="bg-surface-container-high text-white rounded-lg px-3 py-2 border border-outline">
<input type="number" id="product-carbs" placeholder="Carbs (g)" class="bg-surface-container-high text-white rounded-lg px-3 py-2 border border-outline">
</div>

<button onclick="addToDespensa()" class="w-full py-3 rounded-xl bg-primary-container text-white font-bold mt-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_shopping_cart</span>
Agregar a la despensa
</button>
</div>
</div>
</div>

<div class="glass-card rounded-2xl p-4">
<h3 class="text-white font-bold mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">history</span>
Escaneos recientes
</h3>
<div id="recent-scans" class="space-y-2">
<p class="text-on-surface-variant text-sm text-center py-4">No hay escaneos recientes</p>
</div>
</div>
</main>

<script src="/aplicacion-keto/utils.js"></script>
<script>
var lastScannedCode = null;
var cameraActive = false;
var stream = null;
var detector = null;

async function initScanner() {
  var statusEl = document.getElementById('scanner-status');
  var video = document.getElementById('scanner-video');
  
  try {
    statusEl.innerHTML = '<p class="text-yellow-400 text-sm">Solicitando acceso a cámara...</p>';
    
    stream = await navigator.mediaDevices.getUserMedia({
      video: { 
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
    
    statusEl.innerHTML = '<p class="text-green-400 text-sm">Cámara activa - apunta al código de barras</p>';
    document.getElementById('cameraIcon').textContent = 'flash_on';
    
    if ('BarcodeDetector' in window) {
      detector = new BarcodeDetector({
        formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39']
      });
      scanWithDetector();
    } else {
      statusEl.innerHTML = '<p class="text-yellow-400 text-sm">Cámara activa - código de barras no soportado en este navegador</p>';
    }
    
  } catch (err) {
    console.error('Camera error:', err);
    statusEl.innerHTML = '<p class="text-red-400 text-sm">Error: ' + err.message + '</p>';
    alert('No se pudo acceder a la cámara: ' + err.message);
  }
}

async function scanWithDetector() {
  if (!cameraActive || !detector) return;
  
  var video = document.getElementById('scanner-video');
  
  try {
    var barcodes = await detector.detect(video);
    if (barcodes.length > 0) {
      var code = barcodes[0].rawValue;
      if (code && code !== lastScannedCode) {
        onBarcodeDetected(code);
      }
    }
  } catch (e) {}
  
  requestAnimationFrame(scanWithDetector);
}

function onBarcodeDetected(code) {
  lastScannedCode = code;
  playBeep();
  
  document.getElementById('barcode-value').textContent = code;
  document.getElementById('result-section').classList.remove('hidden');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
  
  saveRecentScan(code);
  
  setTimeout(function() { lastScannedCode = null; }, 3000);
}

function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 1800;
    osc.type = 'sine';
    gain.gain.value = 0.3;
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  } catch (e) {}
}

function toggleCamera() {
  var video = document.getElementById('scanner-video');
  var statusEl = document.getElementById('scanner-status');
  
  if (cameraActive) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    cameraActive = false;
    video.srcObject = null;
    document.getElementById('cameraIcon').textContent = 'flash_off';
    statusEl.innerHTML = '<p class="text-yellow-400 text-sm">Cámara apagada</p>';
  } else {
    initScanner();
  }
}

function addToDespensa() {
  var name = document.getElementById('product-name').value.trim();
  if (!name) { alert('Ingresa un nombre'); return; }
  
  var cal = parseFloat(document.getElementById('product-calories').value) || 0;
  var prot = parseFloat(document.getElementById('product-protein').value) || 0;
  var fat = parseFloat(document.getElementById('product-fat').value) || 0;
  var carbs = parseFloat(document.getElementById('product-carbs').value) || 0;
  
  var id = 'p' + Date.now();
  var foods = safeParseJSON(localStorage.getItem('ketoFoods'), []);
  foods.push({ id: id, name: name, calories: cal, protein: prot, fat: fat, carbs: carbs, portion: 100, barcode: lastScannedCode });
  localStorage.setItem('ketoFoods', JSON.stringify(foods));
  
  var despensa = safeParseJSON(localStorage.getItem('despensa'), {});
  despensa[id] = { stock: 100, lastUpdated: new Date().toISOString() };
  localStorage.setItem('despensa', JSON.stringify(despensa));
  
  showToast(name + ' agregado');
  
  document.getElementById('product-name').value = '';
  document.getElementById('product-calories').value = '';
  document.getElementById('product-protein').value = '';
  document.getElementById('product-fat').value = '';
  document.getElementById('product-carbs').value = '';
}

function saveRecentScan(code) {
  var scans = safeParseJSON(localStorage.getItem('recentScans'), []);
  scans.unshift({ code: code, time: new Date().toISOString() });
  if (scans.length > 10) scans = scans.slice(0, 10);
  localStorage.setItem('recentScans', JSON.stringify(scans));
  renderRecentScans();
}

function renderRecentScans() {
  var scans = safeParseJSON(localStorage.getItem('recentScans'), []);
  var container = document.getElementById('recent-scans');
  if (!scans.length) { container.innerHTML = '<p class="text-on-surface-variant text-sm text-center py-4">No hay escaneos recientes</p>'; return; }
  
  container.innerHTML = scans.map(function(s) {
    var t = new Date(s.time).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    return '<div class="flex items-center justify-between p-3 bg-surface-container rounded-xl"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-on-surface-variant">qr_code</span><div><p class="text-white text-sm font-mono">' + s.code + '</p><p class="text-on-surface-variant text-xs">' + t + '</p></div></div></div>';
  }).join('');
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'fixed bottom-20 left-4 right-4 bg-surface-container-high text-white px-4 py-3 rounded-xl shadow-lg z-50 text-center';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

renderRecentScans();
</script>
</body>
</html>
